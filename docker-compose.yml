services:
  mongodb:
    image: mongo:latest
    container_name: library_db
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=library_management
    volumes:
      - ./mongo-db/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
      - mongo_data:/data/db
    networks:
      - app-network

  keycloak-db:
    image: postgres:15
    container_name: web-development-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.2
    container_name: web-development-keycloak
    user: root
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: secret
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "9090:8080"
      - "8443:8443"
    depends_on:
      - keycloak-db
    command:
      - start
      - --http-enabled=true
    networks:
      - app-network

volumes:
  mongo_data:
  keycloak-db-data:

networks:
  app-network:
    driver: bridge